<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="layout" style="justify-content: center; background: black;">
        <input type="text" id="in" placeholder="Enter no">
        <input type="text" id="in2" placeholder="Enter no2">
        <button onclick="add()">add</button>
    </div>
</body>
<script>
    function add(){
        let a = document.getElementById("in").value
        let b = document.getElementById("in2").value
        document.write(Number(a)+Number(b))
    }
</script>
</html>
